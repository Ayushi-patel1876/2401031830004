<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legacy of Bharat</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        
        body {
            background-color: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 50vh;
        }
        
        .container {
            text-align: center;
            width: 80%;
            max-width: 580px;
            padding: 15px;
        }
        
        header {
            margin-bottom: 15px;
        }
        
        h1 {
            font-size: 40px;
            margin-bottom: 5px;
        }
        
        h1 span {
            color: #e67e22;
        }
        
        h2 {
            font-size: 22px;
            font-weight: normal;
        }
        
        main {
            background-color: #5e3a1a;
            border-radius: 5px;
            padding: 30px;
        }
        
        article p {
            font-size: 20px;
            margin-bottom: 30px;
        }
        
        form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            text-align: left;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        label {
            font-size: 16px;
        }
        
        input[type="email"],
        input[type="text"],
        input[type="password"] {
            padding: 12px;
            border: none;
            border-radius: 4px;
            background-color: #a67951;
            color: #fff;
            font-size: 16px;
        }
        
        .checkbox-container {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-top: 5px;
        }
        
        
        a {
            color: #fff;
        }
        
        .join-button {
            align-self: flex-end;
            background-color: #a67951;
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 10px 30px;
            font-size: 24px;
            cursor: pointer;
            margin-top: 10px;
            
        }
        .join-button a{
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Join the <span>Legacy</span></h1>
            <h2>Explore the Stories of Our past</h2>
        </header>
        
        <main>
            <article>
                <p>Creating an account allows you to save your favourite items, create public and private collections.</p>
            </article>
            
            <form>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required>
                </div>
                
                <div class="form-group">
                    <label for="username">Choose a username</label>
                    <input type="text" id="username" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Create Password</label>
                    <input type="password" id="password" required>
                </div>
                
                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" required>
                </div>
                
                <div class="checkbox-container">
                    <input type="checkbox" id="age-confirm" required>
                    <label for="age-confirm">I confirm that I am at least 13 years old</label>
                </div>
                
                <div class="checkbox-container">
                    <input type="checkbox" id="terms-confirm" required>
                    <label for="terms-confirm">I confirm that I have read and accept the <a href="#">Terms of use</a> and <a href="#">Privacy policy</a></label>
                </div>
                
                <button type="submit" class="join-button"><a href="index.html">Join</a></button>
            </form>
        </main>
        
       
    </div>
</body>
</html>
